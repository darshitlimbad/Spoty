name: Deploy Spoty Bot

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install FFmpeg
        run: |
          choco install ffmpeg --confirm --no-progress

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -U --force-reinstall https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz

      - name: Create config.json from secrets
        run: |
          $json = @{
            TOKEN   = "${{ secrets.DISCORD_BOT_TOKEN }}"
            PREFIX  = "${{ secrets.BOT_PREFIX }}"
            ADMINID = "${{ secrets.DISCORD_ADMIN_ID }}"
          } | ConvertTo-Json -Compress
          Set-Content -Path config.json -Value $json
        shell: pwsh

      - name: Run Spoty Bot
        run: |
          python main.py
